      <div class="govuk-grid-column-two-thirds">

        <div class="govuk-form-group">
          <h1 class="govuk-label-wrapper">
            <label class="govuk-label govuk-label--l" for="applicantTelephoneNumber">
              What is the telephone number of the Applicant?

    </div>
