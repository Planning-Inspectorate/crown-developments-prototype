{% extends "layouts/back-office.html" %}

{% set pageName = "How was this representation received?" %}

{% block content %}
    <a href="javascript:history.back()" class="govuk-back-link">Back</a>
    <div class="govuk-grid-row">
        <div class="govuk-grid-column-two-thirds">

            <div class="govuk-form-group">
                <fieldset class="govuk-fieldset">
                    <legend class="govuk-fieldset__legend govuk-fieldset__legend--l">
                        <h1 class="govuk-fieldset__heading">
                            How was this representation received?
                        </h1>
                    </legend>
                    <div class="govuk-radios govuk-radios">
                        <div class="govuk-radios__item">
                            <input class="govuk-radios__input" type="radio" name="submission-method" value="phone">
                            <label class="govuk-label govuk-radios__label">
                                Phone
                            </label>
                        </div>
                        <div class="govuk-radios__item">
                            <input class="govuk-radios__input" type="radio" name="submission-method" value="email">
                            <label class="govuk-label govuk-radios__label">
                                Email
                            </label>
                        </div>
                        <div class="govuk-radios__item">
                            <input class="govuk-radios__input" type="radio" name="submission-method" value="post">
                            <label class="govuk-label govuk-radios__label">
                                Post
                            </label>
                        </div>
                        <div class="govuk-radios__item">
                            <input class="govuk-radios__input" type="radio" name="submission-method" value="in-person">
                            <label class="govuk-label govuk-radios__label">
                                In person
                            </label>
                        </div>
                    </div>
                </fieldset>
            </div>

            <a href="0b-submission-method-reason.html" class="govuk-button">
                Continue
            </a>
        </form>
    </div>
</div>
</main>

{% endblock %}
